<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <meta name="description" content="Personalize o sistema de acordo com suas necessidades." />
  <link rel="icon" type="image/png" href="../assets/logo.png" />
  <link rel="stylesheet" href="../style.css" />
</head>
<body>
  <div class="noise" aria-hidden="true"></div>
  <div class="orb orb--a" aria-hidden="true"></div>
  <div class="orb orb--b" aria-hidden="true"></div>
  <div class="orb orb--c" aria-hidden="true"></div>

  <nav class="nav" id="nav">
    <div class="nav__inner">
      <a href="../home.html" class="nav__brand">
        <img src="../assets/logo.png" alt="SkyLab" class="nav__brand-mark"
          onerror="this.onerror=null;this.style.display='none';this.nextElementSibling.style.display='inline-flex';" />
        <span class="nav__brand-fallback">SL</span>
        <span class="nav__brand-text">Sky<em>Lab</em></span>
      </a>
      <div class="nav__links">
        <a href="../home.html">Dashboard</a>
        <a href="technical-control.html">Reparos</a>
        <a href="inventory.html">Estoque</a>
        <a href="billing.html">Financeiro</a>
      </div>
      <div class="nav__right">
        <a href="../home.html" class="btn btn--nav">← Voltar</a>
        <button class="nav__toggle" id="navToggle" aria-label="Menu"><span></span><span></span><span></span></button>
      </div>
    </div>
    <div class="nav__mobile" id="navMobile">
      <a href="../home.html">Dashboard</a>
      <a href="technical-control.html">Controle Técnico</a>
      <a href="inventory.html">Estoque</a>
      <a href="billing.html">Cobranças</a>
      <a href="warranty.html">Garantias</a>
      <a href="analytics.html">Análises</a>
    </div>
  </nav>

  <div class="page-content">
    <div class="container">
      <div class="page-header reveal">
        <h1 class="page-header__title">Configurações</h1>
        <p class="page-header__desc">Personalize o sistema de acordo com suas necessidades.</p>
      </div>

      <!-- Settings Form -->
      <div class="placeholder-card reveal" style="--index:1; text-align:left;">
        <h2 style="font-family:var(--f-display);font-size:1.1rem;font-weight:700;margin-bottom:24px;text-align:center;">Configurações do Sistema</h2>

        <form id="settings-form" style="max-width:500px;margin:0 auto;display:flex;flex-direction:column;gap:20px;">
          <div class="input-group">
            <label for="store-name">Nome da Loja</label>
            <input type="text" id="store-name" class="input" placeholder="SkyLab Assistência Técnica" />
          </div>

          <div class="input-group">
            <label for="store-phone">Telefone / WhatsApp</label>
            <input type="tel" id="store-phone" class="input" placeholder="(00) 00000-0000" />
          </div>

          <div class="input-group">
            <label for="store-address">Endereço</label>
            <input type="text" id="store-address" class="input" placeholder="Rua, número, bairro, cidade" />
          </div>

          <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
            <div class="input-group">
              <label for="work-hours-open">Horário de Abertura</label>
              <input type="time" id="work-hours-open" class="input" value="08:00" />
            </div>
            <div class="input-group">
              <label for="work-hours-close">Horário de Fechamento</label>
              <input type="time" id="work-hours-close" class="input" value="18:00" />
            </div>
          </div>

          <div class="input-group">
            <label for="pix-key">Chave PIX</label>
            <input type="text" id="pix-key" class="input" placeholder="email@exemplo.com, CPF ou telefone" />
          </div>

          <div class="input-group">
            <label for="warranty-days">Dias de Garantia Padrão</label>
            <input type="number" id="warranty-days" class="input" placeholder="90" min="0" max="365" />
          </div>

          <button type="submit" class="btn btn--primary" style="width:100%;margin-top:8px;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15.2 3a2 2 0 0 1 1.4.6l3.8 3.8a2 2 0 0 1 .6 1.4V19a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2z"/><path d="M17 21v-7a1 1 0 0 0-1-1H8a1 1 0 0 0-1 1v7"/><path d="M7 3v4a1 1 0 0 0 1 1h7"/></svg>
            Salvar Configurações
          </button>
        </form>
      </div>

      <!-- ═══════════════════════════════════════════
           🔥 FIREBASE: Settings CRUD
           Coleção: users/{uid}/settings/general

           Imports necessários:
           import { getFirestore, doc, getDoc, setDoc, serverTimestamp }
             from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

           Exemplo de leitura:
           const snap = await getDoc(doc(db, "users", user.uid, "settings", "general"));
           if (snap.exists()) {
             const data = snap.data();
             document.getElementById('store-name').value = data.storeName || '';
             document.getElementById('store-phone').value = data.phone || '';
             // etc.
           }

           Exemplo de escrita:
           await setDoc(doc(db, "users", user.uid, "settings", "general"), {
             storeName: document.getElementById('store-name').value,
             phone: document.getElementById('store-phone').value,
             address: document.getElementById('store-address').value,
             workHoursOpen: document.getElementById('work-hours-open').value,
             workHoursClose: document.getElementById('work-hours-close').value,
             pixKey: document.getElementById('pix-key').value,
             warrantyDays: parseInt(document.getElementById('warranty-days').value) || 90,
             updatedAt: serverTimestamp()
           }, { merge: true });
           ═══════════════════════════════════════════ -->
    </div>
  </div>

  <footer class="footer">
    <p class="footer__text">&copy; 2026 SkyLab TecGestor — Assistência Técnica</p>
  </footer>

  <script>
    const nav = document.getElementById('nav');
    window.addEventListener('scroll', () => nav.classList.toggle('is-scrolled', window.scrollY > 20), { passive: true });
    const toggle = document.getElementById('navToggle');
    const mobile = document.getElementById('navMobile');
    toggle?.addEventListener('click', () => { mobile.classList.toggle('is-open'); toggle.classList.toggle('is-active'); });
    const obs = new IntersectionObserver(entries => entries.forEach(e => {
      if (e.isIntersecting) { e.target.classList.add('is-visible'); obs.unobserve(e.target); }
    }), { threshold: 0.1 });
    document.querySelectorAll('.reveal').forEach(el => obs.observe(el));

    // Settings form demo
    document.getElementById('settings-form')?.addEventListener('submit', (e) => {
      e.preventDefault();

      // ═══════════════════════════════════════════
      // 🔥 FIREBASE: Save Settings
      // Use setDoc with merge:true to save settings
      // ═══════════════════════════════════════════

      // DEMO: Save to localStorage
      const settings = {
        storeName: document.getElementById('store-name').value,
        phone: document.getElementById('store-phone').value,
        address: document.getElementById('store-address').value,
        workHoursOpen: document.getElementById('work-hours-open').value,
        workHoursClose: document.getElementById('work-hours-close').value,
        pixKey: document.getElementById('pix-key').value,
        warrantyDays: document.getElementById('warranty-days').value
      };
      localStorage.setItem('skylab:settings', JSON.stringify(settings));
      alert('Configurações salvas com sucesso!');
    });

    // Load saved settings
    try {
      const saved = JSON.parse(localStorage.getItem('skylab:settings') || '{}');
      if (saved.storeName) document.getElementById('store-name').value = saved.storeName;
      if (saved.phone) document.getElementById('store-phone').value = saved.phone;
      if (saved.address) document.getElementById('store-address').value = saved.address;
      if (saved.workHoursOpen) document.getElementById('work-hours-open').value = saved.workHoursOpen;
      if (saved.workHoursClose) document.getElementById('work-hours-close').value = saved.workHoursClose;
      if (saved.pixKey) document.getElementById('pix-key').value = saved.pixKey;
      if (saved.warrantyDays) document.getElementById('warranty-days').value = saved.warrantyDays;
    } catch {}
  </script>
</body>
</html>
