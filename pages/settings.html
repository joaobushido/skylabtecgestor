<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkyLab TecGestor — Configurações</title>
  <link rel="icon" type="image/png" href="../assets/logo.png" />
  <link rel="stylesheet" href="../style.css" />
</head>
<body>
  <div class="noise" aria-hidden="true"></div>
  <div class="orb orb--a" aria-hidden="true"></div>
  <div class="orb orb--b" aria-hidden="true"></div>
  <div class="orb orb--c" aria-hidden="true"></div>

  <nav class="nav" id="nav">
    <div class="nav__inner">
      <a href="../home.html" class="nav__brand">
        <img src="../assets/logo.png" alt="SkyLab" class="nav__brand-mark" onerror="this.onerror=null;this.style.display='none';" />
        <span class="nav__brand-fallback">SL</span>
        <span class="nav__brand-text">Sky<em>Lab</em></span>
      </a>
      <div class="nav__links">
        <a href="../home.html">Dashboard</a>
      </div>
      <div class="nav__right"><a href="../home.html" class="btn btn--nav">← Voltar</a></div>
    </div>
  </nav>

  <div class="page-content">
    <div class="container">
      <div class="page-header reveal">
        <h1 class="page-header__title">Configurações</h1>
        <p class="page-header__desc">Personalize os dados da sua assistência.</p>
      </div>

      <div class="card reveal" style="--index:1; max-width: 600px; margin: 24px auto;">
        <form id="settings-form" style="display:flex; flex-direction:column; gap:16px;">
          <div class="input-group" style="margin:0;">
            <label>Nome da Assistência / Loja</label>
            <input type="text" id="store-name" class="input" placeholder="Ex: SkyLab Tec" required />
          </div>
          <div class="input-group" style="margin:0;">
            <label>WhatsApp / Telefone</label>
            <input type="text" id="store-phone" class="input" />
          </div>
          <div class="input-group" style="margin:0;">
            <label>Endereço Completo</label>
            <input type="text" id="store-address" class="input" />
          </div>
          <div style="display:flex; gap:16px;">
            <div class="input-group" style="margin:0; flex:1;">
              <label>Horário de Abertura</label>
              <input type="time" id="work-hours-open" class="input" />
            </div>
            <div class="input-group" style="margin:0; flex:1;">
              <label>Horário de Fechamento</label>
              <input type="time" id="work-hours-close" class="input" />
            </div>
          </div>
          <div style="display:flex; gap:16px;">
            <div class="input-group" style="margin:0; flex:2;">
              <label>Chave PIX (Para receber dos clientes)</label>
              <input type="text" id="pix-key" class="input" />
            </div>
            <div class="input-group" style="margin:0; flex:1;">
              <label>Garantia Padrão (Dias)</label>
              <input type="number" id="warranty-days" class="input" value="90" required />
            </div>
          </div>
          <div style="margin-top: 16px;">
            <button type="submit" id="btn-save-settings" class="btn btn--primary" style="width: 100%;">Salvar Configurações</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyAUaqWg7DPdHgRQh_6WhUayl8t8bLYI4og", authDomain: "tecgestor-skylab.firebaseapp.com", projectId: "tecgestor-skylab", storageBucket: "tecgestor-skylab.firebasestorage.app", messagingSenderId: "512077747740", appId: "1:512077747740:web:80bbef846cb4395f9ab1d9" };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    let currentUser = null;

    onAuthStateChanged(auth, async (user) => {
      if (!user) window.location.href = "../index.html";
      else { 
        currentUser = user; 
        loadSettings(); 
      }
    });

    async function loadSettings() {
      const docRef = doc(db, "users", currentUser.uid, "settings", "profile");
      const snap = await getDoc(docRef);
      if (snap.exists()) {
        const data = snap.data();
        document.getElementById('store-name').value = data.storeName || '';
        document.getElementById('store-phone').value = data.phone || '';
        document.getElementById('store-address').value = data.address || '';
        document.getElementById('work-hours-open').value = data.workHoursOpen || '';
        document.getElementById('work-hours-close').value = data.workHoursClose || '';
        document.getElementById('pix-key').value = data.pixKey || '';
        document.getElementById('warranty-days').value = data.warrantyDays || 90;
      }
    }

    document.getElementById('settings-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('btn-save-settings');
      btn.textContent = "Salvando...";
      
      const settingsData = {
        storeName: document.getElementById('store-name').value,
        phone: document.getElementById('store-phone').value,
        address: document.getElementById('store-address').value,
        workHoursOpen: document.getElementById('work-hours-open').value,
        workHoursClose: document.getElementById('work-hours-close').value,
        pixKey: document.getElementById('pix-key').value,
        warrantyDays: Number(document.getElementById('warranty-days').value)
      };

      try {
        await setDoc(doc(db, "users", currentUser.uid, "settings", "profile"), settingsData, { merge: true });
        alert("Configurações salvas no Banco de Dados com sucesso!");
      } catch (error) {
        alert("Erro ao salvar.");
      }
      btn.textContent = "Salvar Configurações";
    });
  </script>
</body>
</html>
