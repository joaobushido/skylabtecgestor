<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkyLab TecGestor — Garantias</title>
  <link rel="icon" type="image/png" href="../assets/logo.png" />
  <link rel="stylesheet" href="../style.css" />
  <style>
    .table-wrapper { overflow-x: auto; width: 100%; }
    .os-table { width: 100%; border-collapse: collapse; text-align: left; }
    .os-table th { padding: 16px 12px; color: var(--text-2); border-bottom: 1px solid var(--border); font-weight: 600; font-size: 0.85rem; text-transform: uppercase; }
    .os-table td { padding: 16px 12px; border-bottom: 1px solid var(--border); color: var(--text-1); font-size: 0.95rem; }
    .os-table tr:hover td { background: rgba(255,255,255,0.02); }
    
    .badge { padding: 4px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: 600; }
    .badge--Ativa { background: rgba(16, 185, 129, 0.15); color: #10b981; }
    .badge--Expirada { background: rgba(239, 68, 68, 0.15); color: #ef4444; }
    .badge--Acionada { background: rgba(245, 158, 11, 0.15); color: #f59e0b; }

    .action-btn { background: transparent; border: 1px solid var(--border); color: var(--text-2); padding: 6px 10px; border-radius: 6px; cursor: pointer; transition: 0.2s; }
    .action-btn:hover { background: var(--border); color: var(--text-1); }
    .action-btn--danger:hover { background: rgba(239, 68, 68, 0.15); color: #ef4444; border-color: rgba(239, 68, 68, 0.3); }
  </style>
</head>
<body>
  <div class="noise" aria-hidden="true"></div>
  <div class="orb orb--a" aria-hidden="true"></div>
  <div class="orb orb--b" aria-hidden="true"></div>
  <div class="orb orb--c" aria-hidden="true"></div>

  <nav class="nav" id="nav">
    <div class="nav__inner">
      <a href="../home.html" class="nav__brand">
        <img src="../assets/logo.png" alt="SkyLab" class="nav__brand-mark" onerror="this.onerror=null;this.style.display='none';this.nextElementSibling.style.display='inline-flex';" />
        <span class="nav__brand-fallback">SL</span>
        <span class="nav__brand-text">Sky<em>Lab</em></span>
      </a>
      <div class="nav__links">
        <a href="../home.html">Dashboard</a>
        <a href="technical-control.html">Reparos</a>
        <a href="inventory.html">Estoque</a>
        <a href="billing.html">Financeiro</a>
      </div>
      <div class="nav__right">
        <a href="../home.html" class="btn btn--nav">← Voltar</a>
      </div>
    </div>
  </nav>

  <div class="page-content">
    <div class="container">
      <div class="page-header reveal" style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px;">
        <div>
          <h1 class="page-header__title">Garantias</h1>
          <p class="page-header__desc">Acompanhe as garantias ativas dos seus serviços.</p>
        </div>
        <button id="btn-new-warranty" class="btn btn--primary">Nova Garantia</button>
      </div>

      <div class="card reveal" style="--index:1; margin-top: 24px; padding: 0;">
        <div class="table-wrapper">
          <table class="os-table">
            <thead>
              <tr>
                <th>Cliente</th>
                <th>Aparelho</th>
                <th>Nº OS / Serviço</th>
                <th>Vencimento</th>
                <th>Status</th>
                <th style="text-align:right;">Ações</th>
              </tr>
            </thead>
            <tbody id="warranty-tbody">
              <tr><td colspan="6" style="text-align: center; padding: 40px; color: var(--text-3);">Carregando...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <div id="warranty-modal" class="modal-overlay">
    <div class="modal" style="max-width: 500px; width: 100%;">
      <div class="modal__edit-header" style="display:flex; justify-content:space-between; align-items:center; padding:16px 20px; border-bottom:1px solid var(--border);">
        <h3 id="modal-title" style="margin:0; font-size:1.1rem; color:var(--text-1);">Nova Garantia</h3>
        <button id="btn-close-modal" class="modal__close" style="position:static; margin:0; padding:4px;">✖</button>
      </div>
      <form id="warranty-form" style="padding:20px; display:flex; flex-direction:column; gap:16px;">
        <input type="hidden" id="war-id" />
        <div class="input-group" style="margin:0;"><label>Cliente</label><input type="text" id="war-client" class="input" required /></div>
        <div class="input-group" style="margin:0;"><label>Aparelho / Serviço</label><input type="text" id="war-device" class="input" required /></div>
        
        <div style="display:flex; gap:16px;">
          <div class="input-group" style="margin:0; flex:1;"><label>Nº OS Relacionada</label><input type="text" id="war-os" class="input" placeholder="Opcional" /></div>
          <div class="input-group" style="margin:0; flex:1;"><label>Vencimento</label><input type="date" id="war-end" class="input" required /></div>
        </div>
        <div class="input-group" style="margin:0;">
          <label>Status</label>
          <select id="war-status" class="input" required>
            <option value="Ativa">Ativa</option>
            <option value="Expirada">Expirada</option>
            <option value="Acionada">Acionada (Em Análise)</option>
          </select>
        </div>
        <div style="display:flex; justify-content:flex-end; gap:10px; margin-top:8px;">
          <button type="button" id="btn-cancel-modal" class="btn btn--ghost">Cancelar</button>
          <button type="submit" id="btn-save" class="btn btn--primary">Salvar</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyAUaqWg7DPdHgRQh_6WhUayl8t8bLYI4og", authDomain: "tecgestor-skylab.firebaseapp.com", projectId: "tecgestor-skylab", storageBucket: "tecgestor-skylab.firebasestorage.app", messagingSenderId: "512077747740", appId: "1:512077747740:web:80bbef846cb4395f9ab1d9" };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    let currentUser = null;

    onAuthStateChanged(auth, (user) => {
      if (!user) window.location.href = "../index.html";
      else { currentUser = user; listenToWarranties(); }
    });

    const tbody = document.getElementById('warranty-tbody');
    const modal = document.getElementById('warranty-modal');
    const form = document.getElementById('warranty-form');

    function formatDateToBR(dateStr) {
      if (!dateStr) return "-";
      const [y, m, d] = dateStr.split('-');
      return `${d}/${m}/${y}`;
    }

    function listenToWarranties() {
      const q = query(collection(db, "users", currentUser.uid, "warranties"), orderBy("endDate", "asc"));
      onSnapshot(q, (snapshot) => {
        if (snapshot.empty) { tbody.innerHTML = `<tr><td colspan="6" style="text-align:center; padding:40px; color:var(--text-3);">Nenhuma garantia registrada.</td></tr>`; return; }
        let html = "";
        snapshot.forEach((docSnap) => {
          const war = docSnap.data();
          
          // Verifica se expirou hoje automaticamente
          const today = new Date().toISOString().split('T')[0];
          let status = war.status;
          if(war.endDate < today && status === 'Ativa') status = 'Expirada';

          html += `<tr>
            <td><strong style="color:var(--text-1);">${war.client}</strong></td>
            <td>${war.device}</td>
            <td>${war.os || '-'}</td>
            <td>${formatDateToBR(war.endDate)}</td>
            <td><span class="badge badge--${status}">${status}</span></td>
            <td style="text-align:right;">
              <button class="action-btn" onclick="window.editWar('${docSnap.id}', '${war.client}', '${war.device}', '${war.os}', '${war.endDate}', '${status}')">✏️</button>
              <button class="action-btn action-btn--danger" onclick="window.deleteWar('${docSnap.id}')">🗑️</button>
            </td>
          </tr>`;
        });
        tbody.innerHTML = html;
      });
    }

    function openModal() { modal.classList.add('is-open'); }
    function closeModal() { modal.classList.remove('is-open'); form.reset(); document.getElementById('war-id').value = ''; }
    
    document.getElementById('btn-new-warranty').addEventListener('click', () => { closeModal(); openModal(); });
    document.getElementById('btn-close-modal').addEventListener('click', closeModal);
    document.getElementById('btn-cancel-modal').addEventListener('click', closeModal);

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const id = document.getElementById('war-id').value;
      const data = {
        client: document.getElementById('war-client').value,
        device: document.getElementById('war-device').value,
        os: document.getElementById('war-os').value,
        endDate: document.getElementById('war-end').value,
        status: document.getElementById('war-status').value
      };
      document.getElementById('btn-save').textContent = "Salvando...";
      try {
        if (id) await updateDoc(doc(db, "users", currentUser.uid, "warranties", id), data);
        else { data.createdAt = serverTimestamp(); await addDoc(collection(db, "users", currentUser.uid, "warranties"), data); }
        closeModal();
      } catch (e) { alert("Erro ao salvar."); }
      document.getElementById('btn-save').textContent = "Salvar";
    });

    window.editWar = (id, client, device, os, endDate, status) => {
      document.getElementById('war-id').value = id;
      document.getElementById('war-client').value = client;
      document.getElementById('war-device').value = device;
      document.getElementById('war-os').value = os !== 'undefined' ? os : '';
      document.getElementById('war-end').value = endDate;
      document.getElementById('war-status').value = status;
      openModal();
    };

    window.deleteWar = async (id) => {
      if (confirm("Apagar registro de garantia?")) await deleteDoc(doc(db, "users", currentUser.uid, "warranties", id));
    };
  </script>
</body>
</html>
