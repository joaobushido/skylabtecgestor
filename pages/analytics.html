<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkyLab TecGestor — Análise Detalhada</title>
  <link rel="icon" type="image/png" href="../assets/logo.png" />
  <link rel="stylesheet" href="../style.css" />
  <style>
    .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-top: 24px; }
    .kpi-card { background: var(--void-card); border: 1px solid var(--border); border-radius: 12px; padding: 24px; display: flex; flex-direction: column; gap: 8px; }
    .kpi-title { font-size: 0.9rem; color: var(--text-2); text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
    .kpi-value { font-size: 2.5rem; color: var(--text-1); font-weight: 700; font-family: var(--f-display); }
    .kpi-value.money { color: var(--emerald); }
  </style>
</head>
<body>
  <div class="noise"></div><div class="orb orb--a"></div><div class="orb orb--b"></div><div class="orb orb--c"></div>
  <nav class="nav" id="nav">
    <div class="nav__inner">
      <a href="../home.html" class="nav__brand">
        <img src="../assets/logo.png" alt="SkyLab" class="nav__brand-mark" onerror="this.onerror=null;this.style.display='none';" />
        <span class="nav__brand-fallback">SL</span><span class="nav__brand-text">Sky<em>Lab</em></span>
      </a>
      <div class="nav__links"><a href="../home.html">Dashboard</a></div>
      <div class="nav__right"><a href="../home.html" class="btn btn--nav">← Voltar</a></div>
    </div>
  </nav>

  <div class="page-content">
    <div class="container">
      <div class="page-header reveal">
        <h1 class="page-header__title">Análise Detalhada</h1>
        <p class="page-header__desc">Visualize o volume de serviços e faturamento do seu negócio.</p>
      </div>

      <div class="kpi-grid reveal" style="--index:1">
        
        <div class="kpi-card">
          <div class="kpi-title">Ordens de Serviço (Total)</div>
          <div class="kpi-value" id="kpi-os-total">--</div>
        </div>

        <div class="kpi-card">
          <div class="kpi-title">Reparos Concluídos/Entregues</div>
          <div class="kpi-value" id="kpi-os-done" style="color: var(--cyan);">--</div>
        </div>

        <div class="kpi-card">
          <div class="kpi-title">Vendas (Balcão)</div>
          <div class="kpi-value" id="kpi-sales-count" style="color: var(--orange);">--</div>
        </div>

        <div class="kpi-card">
          <div class="kpi-title">Faturamento Bruto (Serviços + Vendas)</div>
          <div class="kpi-value money" id="kpi-revenue">R$ 0,00</div>
        </div>

      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
    import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyAUaqWg7DPdHgRQh_6WhUayl8t8bLYI4og", authDomain: "tecgestor-skylab.firebaseapp.com", projectId: "tecgestor-skylab", storageBucket: "tecgestor-skylab.firebasestorage.app", messagingSenderId: "512077747740", appId: "1:512077747740:web:80bbef846cb4395f9ab1d9" };
    const app = initializeApp(firebaseConfig); const auth = getAuth(app); const db = getFirestore(app);

    onAuthStateChanged(auth, (user) => { if (!user) window.location.href = "../index.html"; else { loadAnalytics(user.uid); } });

    function loadAnalytics(uid) {
      // Lê Serviços
      onSnapshot(collection(db, "users", uid, "services"), (snap) => {
        let totalOS = 0; let doneOS = 0; let revenueOS = 0;
        snap.forEach(doc => {
          totalOS++;
          const data = doc.data();
          if(data.status === "Concluído" || data.status === "Entregue") {
            doneOS++;
            revenueOS += Number(data.price || 0);
          }
        });
        document.getElementById('kpi-os-total').textContent = totalOS;
        document.getElementById('kpi-os-done').textContent = doneOS;
        updateTotalRevenue(revenueOS, 0); // Vendas vêm no outro listener
      });

      // Lê Vendas
      onSnapshot(collection(db, "users", uid, "sales"), (snap) => {
        let totalSales = 0; let revenueSales = 0;
        snap.forEach(doc => {
          totalSales++;
          revenueSales += Number(doc.data().amount || 0);
        });
        document.getElementById('kpi-sales-count').textContent = totalSales;
        updateTotalRevenue(0, revenueSales); 
      });
    }

    let globalOsRev = 0; let globalSalesRev = 0;
    function updateTotalRevenue(osRev, salesRev) {
      if(osRev > 0) globalOsRev = osRev;
      if(salesRev > 0) globalSalesRev = salesRev;
      const total = globalOsRev + globalSalesRev;
      document.getElementById('kpi-revenue').textContent = total.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
    }
  </script>
</body>
</html>
