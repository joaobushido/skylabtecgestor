<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkyLab TecGestor — Estoque de Peças</title>
  <meta name="description" content="Controle completo do seu inventário de peças e componentes." />
  <link rel="icon" type="image/png" href="../assets/logo.png" />
  <link rel="stylesheet" href="../style.css" />
  <style>
    .inv-table{width:100%;border-collapse:separate;border-spacing:0;margin-top:24px}.inv-table th{font-size:.62rem;font-weight:800;text-transform:uppercase;letter-spacing:.12em;color:var(--text-3);text-align:left;padding:12px 14px;border-bottom:1px solid var(--border)}.inv-table td{padding:12px 14px;border-bottom:1px solid rgba(255,255,255,.04);font-size:.85rem;color:var(--text-2)}.inv-table tr:hover td{background:rgba(255,255,255,.02)}.inv-table tr.low-stock td{background:rgba(239,68,68,.04)}.qty-badge{padding:3px 10px;border-radius:999px;font-size:.7rem;font-weight:700}.qty-ok{background:rgba(16,185,129,.12);color:var(--emerald)}.qty-low{background:rgba(245,158,11,.12);color:var(--amber)}.qty-out{background:rgba(239,68,68,.12);color:var(--red)}.add-form{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-top:24px}.add-form--full{grid-column:1/-1}.act-btn{padding:6px;border-radius:6px;color:var(--text-3);transition:color .2s,background .2s}.act-btn:hover{color:var(--text-1);background:rgba(255,255,255,.06)}.act-btn svg{width:16px;height:16px}.inv-empty{text-align:center;padding:60px 20px;color:var(--text-3);font-size:.88rem}@media(max-width:768px){.add-form{grid-template-columns:1fr}.inv-table{display:block;overflow-x:auto}}
  </style>
</head>
<body>
  <div class="noise" aria-hidden="true"></div>
  <div class="orb orb--a" aria-hidden="true"></div>
  <div class="orb orb--b" aria-hidden="true"></div>
  <div class="orb orb--c" aria-hidden="true"></div>
  <nav class="nav" id="nav"><div class="nav__inner"><a href="../home.html" class="nav__brand"><img src="../assets/logo.png" alt="SkyLab" class="nav__brand-mark" onerror="this.onerror=null;this.style.display='none';this.nextElementSibling.style.display='inline-flex';"/><span class="nav__brand-fallback">SL</span><span class="nav__brand-text">Sky<em>Lab</em></span></a><div class="nav__links"><a href="../home.html">Dashboard</a><a href="technical-control.html">Reparos</a><a href="inventory.html" style="color:var(--text-1)">Estoque</a><a href="billing.html">Financeiro</a></div><div class="nav__right"><a href="../home.html" class="btn btn--nav">← Voltar</a><button class="nav__toggle" id="navToggle" aria-label="Menu"><span></span><span></span><span></span></button></div></div><div class="nav__mobile" id="navMobile"><a href="../home.html">Dashboard</a><a href="technical-control.html">Controle Técnico</a><a href="inventory.html">Estoque</a><a href="billing.html">Cobranças</a><a href="warranty.html">Garantias</a><a href="settings.html">Configurações</a></div></nav>

  <div class="page-content">
    <div class="container" style="max-width:1100px;">
      <div class="page-header reveal"><h1 class="page-header__title">Estoque de Peças</h1><p class="page-header__desc">Controle completo do seu inventário de peças e componentes.</p></div>

      <div class="card reveal" style="--index:1;cursor:default;margin-top:24px;">
        <h3 style="font-size:.72rem;font-weight:800;text-transform:uppercase;letter-spacing:.12em;color:var(--text-3);margin-bottom:16px;">Adicionar Peça</h3>
        <form id="inv-form" class="add-form">
          <div class="input-group"><label for="inv-name">Nome da Peça</label><input type="text" id="inv-name" class="input" placeholder="Tela iPhone 14" required/></div>
          <div class="input-group"><label for="inv-category">Categoria</label><input type="text" id="inv-category" class="input" placeholder="Telas"/></div>
          <div class="input-group"><label for="inv-code">Código</label><input type="text" id="inv-code" class="input" placeholder="SKU-001"/></div>
          <div class="input-group"><label for="inv-qty">Quantidade</label><input type="number" id="inv-qty" class="input" placeholder="10" min="0" required/></div>
          <div class="input-group"><label for="inv-cost">Custo (R$)</label><input type="number" id="inv-cost" class="input" placeholder="180.00" step="0.01" min="0"/></div>
          <div class="input-group"><label for="inv-price">Preço Venda (R$)</label><input type="number" id="inv-price" class="input" placeholder="350.00" step="0.01" min="0"/></div>
          <div class="add-form--full" style="display:flex;gap:10px;justify-content:flex-end;"><button type="submit" class="btn btn--primary btn--sm"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" x2="12" y1="5" y2="19"/><line x1="5" x2="19" y1="12" y2="12"/></svg> Adicionar</button></div>
        </form>
      </div>

      <div class="card reveal" style="--index:2;cursor:default;margin-top:16px;padding:0;overflow:hidden;">
        <div style="padding:20px 24px 0;display:flex;align-items:center;justify-content:space-between;"><h3 style="font-size:.72rem;font-weight:800;text-transform:uppercase;letter-spacing:.12em;color:var(--text-3);">Itens em Estoque <span id="inv-count" style="opacity:.5;margin-left:4px;"></span></h3></div>
        <div id="inv-list" style="overflow-x:auto;"><div class="inv-empty">Carregando...</div></div>
      </div>
    </div>
  </div>
  <footer class="footer"><p class="footer__text">&copy; 2026 SkyLab TecGestor — Assistência Técnica</p></footer>

  <script type="module">
    import { auth, db, doc, updateDoc, deleteDoc, collection, onSnapshot, query, orderBy, addDoc, serverTimestamp } from './page-init.js';
    let items = [];
    function esc(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}

    window.addEventListener('skylab:ready', ({detail:{user}}) => {
      const uid = user.uid;
      const colRef = collection(db,'users',uid,'inventory');
      onSnapshot(query(colRef,orderBy('createdAt','desc')),(snap)=>{
        items = snap.docs.map(d=>({id:d.id,...d.data()}));
        render();
      });

      document.getElementById('inv-form').addEventListener('submit', async(e)=>{
        e.preventDefault();
        const btn=e.target.querySelector('button[type="submit"]'); btn.disabled=true;
        try{
          await addDoc(colRef,{
            name:document.getElementById('inv-name').value.trim(),
            category:document.getElementById('inv-category').value.trim(),
            code:document.getElementById('inv-code').value.trim(),
            quantity:parseInt(document.getElementById('inv-qty').value)||0,
            cost:parseFloat(document.getElementById('inv-cost').value)||0,
            salePrice:parseFloat(document.getElementById('inv-price').value)||0,
            createdAt:serverTimestamp(),updatedAt:serverTimestamp()
          });
          e.target.reset();
        }catch(err){alert('Erro: '+err.message)}
        btn.disabled=false;
      });
    });

    function qtyBadge(q){
      if(q<=0) return `<span class="qty-badge qty-out">${q}</span>`;
      if(q<=2) return `<span class="qty-badge qty-low">${q}</span>`;
      return `<span class="qty-badge qty-ok">${q}</span>`;
    }

    function render(){
      const el=document.getElementById('inv-list');
      document.getElementById('inv-count').textContent=`(${items.length})`;
      if(!items.length){el.innerHTML='<div class="inv-empty">Nenhuma peça cadastrada.</div>';return;}
      el.innerHTML=`<table class="inv-table"><thead><tr><th>Peça</th><th>Categoria</th><th>Código</th><th>Qtd</th><th>Custo</th><th>Venda</th><th></th></tr></thead><tbody>${items.map(i=>`<tr class="${(parseInt(i.quantity)||0)<=2?'low-stock':''}"><td style="color:var(--text-1);font-weight:600;">${esc(i.name)}</td><td>${esc(i.category)}</td><td style="font-family:var(--f-mono);font-size:.78rem;">${esc(i.code)}</td><td>${qtyBadge(i.quantity||0)}</td><td style="font-family:var(--f-mono);">R$ ${(i.cost||0).toFixed(2)}</td><td style="font-family:var(--f-mono);">R$ ${(i.salePrice||0).toFixed(2)}</td><td style="display:flex;gap:4px;"><button class="act-btn" onclick="window.__adjQty('${i.id}',1)" title="+1"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" x2="12" y1="5" y2="19"/><line x1="5" x2="19" y1="12" y2="12"/></svg></button><button class="act-btn" onclick="window.__adjQty('${i.id}',-1)" title="-1"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="5" x2="19" y1="12" y2="12"/></svg></button><button class="act-btn" onclick="window.__delInv('${i.id}')" title="Excluir" style="color:var(--red);"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg></button></td></tr>`).join('')}</tbody></table>`;
    }

    window.__adjQty=async(id,delta)=>{const item=items.find(i=>i.id===id);if(!item)return;const nq=Math.max(0,(parseInt(item.quantity)||0)+delta);try{const u=auth.currentUser;if(u)await updateDoc(doc(db,'users',u.uid,'inventory',id),{quantity:nq,updatedAt:serverTimestamp()})}catch(e){console.error(e)}};
    window.__delInv=async(id)=>{if(!confirm('Excluir esta peça?'))return;try{const u=auth.currentUser;if(u)await deleteDoc(doc(db,'users',u.uid,'inventory',id))}catch(e){console.error(e)}};
  </script>
</body>
</html>
