<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkyLab TecGestor — Sugestões</title>
  <meta name="description" content="Envie suas ideias e sugestões para melhorar o sistema." />
  <link rel="icon" type="image/png" href="../assets/logo.png" />
  <link rel="stylesheet" href="../style.css" />
  <style>
    .sug-list{display:flex;flex-direction:column;gap:12px;margin-top:24px}.sug-item{padding:20px;border-radius:var(--r-m);background:rgba(255,255,255,.03);border:1px solid var(--border);transition:border-color .3s}.sug-item:hover{border-color:var(--border-hover)}.sug-item__head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}.sug-item__text{flex:1;font-size:.88rem;color:var(--text-1);line-height:1.5;white-space:pre-line}.sug-item__meta{display:flex;align-items:center;gap:10px;margin-top:10px;font-size:.72rem;color:var(--text-3)}.sug-badge{padding:3px 10px;border-radius:999px;font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em}.sug-pending{background:rgba(245,158,11,.12);color:var(--amber)}.sug-read{background:rgba(43,98,232,.12);color:var(--blue-bright)}.sug-done{background:rgba(16,185,129,.12);color:var(--emerald)}.act-btn{padding:6px;border-radius:6px;color:var(--text-3);transition:color .2s,background .2s}.act-btn:hover{color:var(--text-1);background:rgba(255,255,255,.06)}.act-btn svg{width:16px;height:16px}.sug-empty{text-align:center;padding:60px 20px;color:var(--text-3);font-size:.88rem}
  </style>
</head>
<body>
  <div class="noise" aria-hidden="true"></div><div class="orb orb--a" aria-hidden="true"></div><div class="orb orb--b" aria-hidden="true"></div><div class="orb orb--c" aria-hidden="true"></div>
  <nav class="nav" id="nav"><div class="nav__inner"><a href="../home.html" class="nav__brand"><img src="../assets/logo.png" alt="SkyLab" class="nav__brand-mark" onerror="this.onerror=null;this.style.display='none';this.nextElementSibling.style.display='inline-flex';"/><span class="nav__brand-fallback">SL</span><span class="nav__brand-text">Sky<em>Lab</em></span></a><div class="nav__links"><a href="../home.html">Dashboard</a><a href="technical-control.html">Reparos</a><a href="inventory.html">Estoque</a><a href="billing.html">Financeiro</a></div><div class="nav__right"><a href="../home.html" class="btn btn--nav">← Voltar</a><button class="nav__toggle" id="navToggle" aria-label="Menu"><span></span><span></span><span></span></button></div></div><div class="nav__mobile" id="navMobile"><a href="../home.html">Dashboard</a><a href="technical-control.html">Controle Técnico</a><a href="inventory.html">Estoque</a><a href="billing.html">Cobranças</a><a href="warranty.html">Garantias</a><a href="settings.html">Configurações</a></div></nav>

  <div class="page-content">
    <div class="container" style="max-width:800px;">
      <div class="page-header reveal"><h1 class="page-header__title">Sugestões</h1><p class="page-header__desc">Envie suas ideias para melhorar o sistema.</p></div>

      <div class="card reveal" style="--index:1;cursor:default;margin-top:24px;">
        <h3 style="font-size:.72rem;font-weight:800;text-transform:uppercase;letter-spacing:.12em;color:var(--text-3);margin-bottom:16px;">Nova Sugestão</h3>
        <form id="sug-form" style="display:flex;flex-direction:column;gap:16px;">
          <div class="input-group"><label for="sug-text">Sua sugestão</label><textarea id="sug-text" class="input" rows="4" placeholder="Descreva sua ideia aqui..." required style="resize:vertical;min-height:100px;"></textarea></div>
          <div style="display:flex;justify-content:flex-end;"><button type="submit" class="btn btn--primary btn--sm"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg> Enviar Sugestão</button></div>
        </form>
      </div>

      <div class="card reveal" style="--index:2;cursor:default;margin-top:16px;">
        <h3 style="font-size:.72rem;font-weight:800;text-transform:uppercase;letter-spacing:.12em;color:var(--text-3);margin-bottom:16px;">Suas Sugestões</h3>
        <div id="sug-list"><div class="sug-empty">Carregando...</div></div>
      </div>
    </div>
  </div>
  <footer class="footer"><p class="footer__text">&copy; 2026 SkyLab TecGestor — Assistência Técnica</p></footer>

  <script type="module">
    import { auth, db, doc, deleteDoc, collection, onSnapshot, query, orderBy, where, addDoc, serverTimestamp, Timestamp } from './page-init.js';
    let suggestions=[];
    function esc(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
    function fmtDate(ts){if(!ts)return'';try{const d=ts instanceof Timestamp?ts.toDate():new Date(ts);return d.toLocaleDateString('pt-BR')+' '+d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}catch{return''}}

    window.addEventListener('skylab:ready',({detail:{user}})=>{
      const uid=user.uid;
      // Listen to user's own suggestions
      onSnapshot(query(collection(db,'suggestions'),where('userId','==',uid),orderBy('createdAt','desc')),(snap)=>{
        suggestions=snap.docs.map(d=>({id:d.id,...d.data()}));render();
      },(err)=>{
        console.warn('Suggestions query needs composite index. Falling back...',err);
        // Fallback: load all and filter client-side
        onSnapshot(query(collection(db,'suggestions'),orderBy('createdAt','desc')),(snap)=>{
          suggestions=snap.docs.map(d=>({id:d.id,...d.data()})).filter(s=>s.userId===uid);
          render();
        });
      });

      document.getElementById('sug-form').addEventListener('submit',async(e)=>{
        e.preventDefault();const btn=e.target.querySelector('button[type="submit"]');btn.disabled=true;
        const text=document.getElementById('sug-text').value.trim();
        if(!text){btn.disabled=false;return}
        try{
          await addDoc(collection(db,'suggestions'),{
            userId:uid,
            userName:user.displayName||user.email||'',
            text,
            status:'pendente',
            createdAt:serverTimestamp()
          });
          document.getElementById('sug-text').value='';
        }catch(err){alert('Erro: '+err.message)}
        btn.disabled=false;
      });
    });

    function statusBadge(s){
      const l=(s||'pendente').toLowerCase();
      if(l==='implementada'||l==='done')return`<span class="sug-badge sug-done">Implementada</span>`;
      if(l==='lida'||l==='read')return`<span class="sug-badge sug-read">Lida</span>`;
      return`<span class="sug-badge sug-pending">Pendente</span>`;
    }

    function render(){
      const el=document.getElementById('sug-list');
      if(!suggestions.length){el.innerHTML='<div class="sug-empty">Você ainda não enviou sugestões.</div>';return}
      el.innerHTML=`<div class="sug-list">${suggestions.map(s=>`<div class="sug-item">
        <div class="sug-item__head">
          <div class="sug-item__text">${esc(s.text)}</div>
          <button class="act-btn" onclick="window.__delSug('${s.id}')" title="Excluir" style="color:var(--red);flex-shrink:0;"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg></button>
        </div>
        <div class="sug-item__meta">${statusBadge(s.status)}<span>${fmtDate(s.createdAt)}</span></div>
      </div>`).join('')}</div>`;
    }
    window.__delSug=async(id)=>{if(!confirm('Excluir sugestão?'))return;try{await deleteDoc(doc(db,'suggestions',id))}catch(e){console.error(e)}};
  </script>
</body>
</html>
