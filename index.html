<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkyLab TecGestor — Login</title>
  <meta name="description" content="SkyLab TecGestor — Sistema de gestão para assistência técnica. Faça login para acessar o painel." />
  <link rel="icon" type="image/png" href="assets/logo.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="noise" aria-hidden="true"></div>
  <div class="orb orb--a" aria-hidden="true"></div>
  <div class="orb orb--b" aria-hidden="true"></div>
  <div class="orb orb--c" aria-hidden="true"></div>

  <div class="login-page">
    <div class="login-card">
      <div class="login-card__logo">
        <img src="assets/logo.png" alt="SkyLab Assistência Técnica" />
      </div>

      <h1 class="login-card__title" id="form-main-title">Bem-vindo de volta</h1>
      <p class="login-card__subtitle" id="form-main-subtitle">Acesse o painel de gestão</p>

      <div id="login-error" class="login-card__error">
        Ocorreu um erro. Tente novamente.
      </div>

      <button type="button" id="google-login-btn" class="btn btn--secondary" style="width:100%; background: #ffffff; color: #333333; border: 1px solid #d1d5db; display: flex; justify-content: center; gap: 10px; margin-bottom: 16px; font-weight: 500;">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="20px" height="20px"><path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"/><path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"/><path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"/><path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z"/></svg>
        Continuar com o Google
      </button>

      <div style="display: flex; align-items: center; margin-bottom: 16px;">
        <div style="flex: 1; height: 1px; background: var(--border);"></div>
        <span style="padding: 0 10px; color: var(--text-3); font-size: 0.85rem;">ou use seu e-mail</span>
        <div style="flex: 1; height: 1px; background: var(--border);"></div>
      </div>

      <form id="login-form" class="login-card__form" autocomplete="on">
        <div class="input-group">
          <label for="login-email">E-mail</label>
          <input type="email" id="login-email" class="input" placeholder="seu@email.com" required autocomplete="email" />
        </div>

        <div class="input-group">
          <label for="login-password">Senha</label>
          <input type="password" id="login-password" class="input" placeholder="••••••••" required autocomplete="current-password" />
        </div>

        <button type="submit" id="login-submit" class="btn btn--primary" style="width:100%; margin-top: 8px;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" x2="3" y1="12" y2="12"/></svg>
          Entrar
        </button>
      </form>

      <div id="login-footer" class="login-card__footer">
        Não tem conta?
        <a href="#" id="register-link">Criar conta</a>
      </div>

      <form id="register-form" class="login-card__form hidden" autocomplete="on">
        <div class="input-group">
          <label for="register-name">Nome completo</label>
          <input type="text" id="register-name" class="input" placeholder="Seu nome" required autocomplete="name" />
        </div>

        <div class="input-group">
          <label for="register-email">E-mail</label>
          <input type="email" id="register-email" class="input" placeholder="seu@email.com" required autocomplete="email" />
        </div>

        <div class="input-group">
          <label for="register-password">Senha</label>
          <input type="password" id="register-password" class="input" placeholder="Mínimo 6 caracteres" required minlength="6" autocomplete="new-password" />
        </div>

        <button type="submit" id="register-submit" class="btn btn--primary" style="width:100%; margin-top: 8px;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" x2="19" y1="8" y2="14"/><line x1="22" x2="16" y1="11" y2="11"/></svg>
          Criar conta
        </button>
      </form>

      <div id="register-footer" class="login-card__footer hidden">
        Já tem conta?
        <a href="#" id="login-link">Fazer login</a>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    // Suas credenciais
    const firebaseConfig = {
      apiKey: "AIzaSyAUaqWg7DPdHgRQh_6WhUayl8t8bLYI4og",
      authDomain: "tecgestor-skylab.firebaseapp.com",
      projectId: "tecgestor-skylab",
      storageBucket: "tecgestor-skylab.firebasestorage.app",
      messagingSenderId: "512077747740",
      appId: "1:512077747740:web:80bbef846cb4395f9ab1d9"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // 1. Redireciona para a home se o usuário já estiver logado
    onAuthStateChanged(auth, (user) => {
      if (user) {
        window.location.href = "home.html";
      }
    });

    const loginForm = document.getElementById('login-form');
    const registerForm = document.getElementById('register-form');
    const registerLink = document.getElementById('register-link');
    const loginLink = document.getElementById('login-link');
    const loginError = document.getElementById('login-error');
    const googleBtn = document.getElementById('google-login-btn');
    const registerFooter = document.getElementById('register-footer');
    const loginFooter = document.getElementById('login-footer');
    const formMainTitle = document.getElementById('form-main-title');
    const formMainSubtitle = document.getElementById('form-main-subtitle');

    // Alternar formulários E-mail/Senha
    registerLink.addEventListener('click', (e) => {
      e.preventDefault();
      loginForm.classList.add('hidden');
      loginFooter.classList.add('hidden');
      registerForm.classList.remove('hidden');
      registerFooter.classList.remove('hidden');
      loginError.classList.remove('is-visible');
      formMainTitle.textContent = 'Criar conta';
      formMainSubtitle.textContent = 'Preencha os dados abaixo';
    });

    loginLink.addEventListener('click', (e) => {
      e.preventDefault();
      registerForm.classList.add('hidden');
      registerFooter.classList.add('hidden');
      loginForm.classList.remove('hidden');
      loginFooter.classList.remove('hidden');
      loginError.classList.remove('is-visible');
      formMainTitle.textContent = 'Bem-vindo de volta';
      formMainSubtitle.textContent = 'Acesse o painel de gestão';
    });

    // 2. Login com GOOGLE
    const googleProvider = new GoogleAuthProvider();
    googleBtn.addEventListener('click', async () => {
      loginError.classList.remove('is-visible');
      try {
        const result = await signInWithPopup(auth, googleProvider);
        // Salva os dados do Google no banco de dados
        await setDoc(doc(db, "users", result.user.uid), {
          name: result.user.displayName,
          email: result.user.email,
          lastLogin: serverTimestamp()
        }, { merge: true });
        // O onAuthStateChanged lá em cima vai cuidar do redirecionamento!
      } catch (error) {
        console.error(error);
        loginError.textContent = "Erro ao entrar com Google. Fechou a janela ou cancelou.";
        loginError.classList.add('is-visible');
      }
    });

    // 3. Login com E-mail
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;
      loginError.classList.remove('is-visible');

      try {
        await signInWithEmailAndPassword(auth, email, password);
      } catch (error) {
        loginError.textContent = getErrorMessage(error.code);
        loginError.classList.add('is-visible');
      }
    });

    // 4. Registro com E-mail
    registerForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('register-name').value;
      const email = document.getElementById('register-email').value;
      const password = document.getElementById('register-password').value;
      loginError.classList.remove('is-visible');

      try {
        const cred = await createUserWithEmailAndPassword(auth, email, password);
        await setDoc(doc(db, "users", cred.user.uid), {
          name: name,
          email: email,
          createdAt: serverTimestamp()
        });
      } catch (error) {
        loginError.textContent = getErrorMessage(error.code);
        loginError.classList.add('is-visible');
      }
    });

    function getErrorMessage(code) {
      const msgs = {
        'auth/invalid-email': 'E-mail inválido.',
        'auth/user-disabled': 'Conta desabilitada.',
        'auth/user-not-found': 'Usuário não encontrado.',
        'auth/invalid-credential': 'E-mail ou senha incorretos.',
        'auth/wrong-password': 'Senha incorreta.',
        'auth/email-already-in-use': 'Este e-mail já está em uso.',
        'auth/weak-password': 'A senha precisa ter pelo menos 6 caracteres.',
      };
      return msgs[code] || 'Erro ao autenticar. Tente novamente.';
    }
  </script>
</body>
</html>
